<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de Deseos - Victoria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Mis 15 - Muro de Deseos ✨</h1>
    </header>

    <main class="container">
        <section class="input-section">
            <textarea id="textoDeseo" placeholder="Escribe tu deseo para Victoria..."></textarea>
            
            <div class="controls">
                <button id="btnGrabar" class="btn-audio">🎤 Grabar Audio</button>
                <button id="btnEnviar" class="btn-enviar">Enviar Deseo</button>
            </div>
            <p id="statusAudio"></p>
        </section>

        <hr>

        <section id="muro" class="muro-grid">
            </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
