<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de Deseos - Victoria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="app-container">

    <header class="header">
        <h1> El muro de los deseos</h1>
        <p>Deja tu mensaje o audio para el recuerdo</p>
    </header>

    <main class="muro-wrapper">
        <section id="muro" class="muro-grid">
        </section>
    </main>



    <section class="action-bar">
        <div class="input-container" style="flex-direction: column;gap: 10px;">
            <input type="text" id="nombreInvitado" placeholder="Tu nombre..." 
           style="width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 8px 15px; color: white;">
           <div style="flex: 1; position: relative;">
            <textarea id="textoDeseo" maxlength="200" placeholder="Escribe tu deseo..."></textarea>
            <small id="charCount" style="color: rgba(85, 85, 85, 0.4); position: absolute; bottom: 8px; right: 80px; font-size: 0.7rem;">0 / 200</small>
        </div>
    <div class="buttons-group">
        <button id="btnGrabar" class="btn-action btn-mic" title="Grabar audio">
            <span class="material-symbols-outlined">mic</span>
        </button>
        
        <button id="btnEnviar" class="btn-action btn-send" title="Enviar deseo">
            <span class="material-symbols-outlined">send</span>
        </button>
    </div>
        </div>
        <p id="statusAudio"></p>
    </section>

    <footer class="main-footer">
        <div class="brand">
            <p>Desarrollado por <strong>Vision Design</strong></p>
            <!-- <div class="footer-links">
                <a href="#">Contacto</a> • 
                <a href="#">Portfolio</a> • 
                <a href="#">Instagram</a>
            </div> -->
            <a href="https://vcard-visiondesign.netlify.app/">Contactanos</a>
        </div>
    </footer>

        
    <script type="module" src="main.js"></script>
</body>
</html>
